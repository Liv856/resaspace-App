<!-- public/profil.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profil Utilisateur</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #e0f2e9; /* vert clair */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .profil-container {
      background-color: hsl(145, 51%, 41%);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    h2 {
      text-align: center;
      color: #2e7d32;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    button {
      background-color: #8c2bc5;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background-color: #27632a;
    }
  </style>
</head>
<body>

  <div class="profil-container">
    <a href="/dashboard.html" class="back-link">← Retour au tableau de bord</a>
    <h2>Mon Profil</h2>
    <form id="profilForm"autocomplete="off">
      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" required>

      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="motdepasse">Mot de passe</label>
      <input type="password" id="motdepasse" name="motdepasse">

      <button type="submit">Sauvegarder</button>
    </form>
  </div>

  <script>
    // Charger les infos utilisateur existantes
    fetch('/api/users/utilisateur')
      .then(response => response.json())
      .then(data => {
        if (data.utilisateur) {
          document.getElementById('nom').value = data.utilisateur.nom;
          document.getElementById('prenom').value = data.utilisateur.prenom;
          document.getElementById('email').value = data.utilisateur.email;
        }
      });

    // Sauvegarder les modifications
    document.getElementById('profilForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const formData = {
        nom: document.getElementById('nom').value,
        prenom: document.getElementById('prenom').value,
        email: document.getElementById('email').value,
        motdepasse: document.getElementById('motdepasse').value
      };

      fetch('/api/users/utilisateur/modifier', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
        .then(response => response.json())
        .then(data => {
          alert(data.message);
        });
    });
  </script>
  <script>
  const emailInput = document.getElementById('email');
  emailInput.addEventListener('input', function () {
    const email = this.value;
    if (!email.includes('@') || !email.includes('.')) {
      this.setCustomValidity("Adresse email invalide");
    } else {
      this.setCustomValidity("");
    }
  });
</script>


</body>
</html>

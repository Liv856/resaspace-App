<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin</title>
  <link rel="stylesheet" href="/admin.css">
  <style>
    .error-message {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body class="login-body">
  <div class="login-container">
    <h2>Connexion Administrateur</h2>
    <form action="/admin/login" method="POST" autocomplete="off">
      <input type="text" name="username" placeholder="Nom d'utilisateur" required autocomplete="off">
      <input type="password" name="password" placeholder="Mot de passe" required autocomplete="new-password">
      <button type="submit">Se connecter</button>
    </form>

    <!-- Conteneur du message d'erreur -->
    <p id="error-container" class="error-message" style="display: none;"></p>
  </div>

  <script>
  const params = new URLSearchParams(window.location.search);
  const error = params.get("error");

  if (error) {
    const errorElement = document.getElementById("error-container");
    errorElement.textContent = error;
    errorElement.style.display = "block";

    // Supprimer le message après 3 secondes
    setTimeout(() => {
      errorElement.style.display = "none";
    }, 3000);
  }
</script>

</body>
</html>

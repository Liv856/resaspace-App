<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResaSpace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d') no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Overlay sombre */
.overlay {
  background: rgba(0,0,0,0.6);
  position: absolute;
  width: 100%;
  height: 100%;
}

/* Card principale */
.container {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.95);
  padding: 50px;
  border-radius: 20px;
  text-align: center;
  max-width: 600px;
  width: 90%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  animation: fadeIn 1s ease-in-out;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 15px;
  color: #2c3e50;
}

p {
  color: #555;
  margin-bottom: 30px;
}

/* Boutons */
.buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.btn {
  padding: 12px 25px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.btn-primary {
  background: #27ae60;
  color: white;
}

.btn-primary:hover {
  background: #219150;
}

.btn-secondary {
  background: #2980b9;
  color: white;
}

.btn-secondary:hover {
  background: #1f6391;
}

/* Animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>ResaSpace</h1>
  <p>Plateforme intelligente de réservation de salles et de ressources en entreprise.</p>

  <div class="buttons">
    <button class="btn btn-primary" onclick="window.location.href='/auth.html'">S'inscrire</button>
    <button class="btn btn-secondary" onclick="window.location.href='/auth.html'">Se connecter</button>
  </div>
</div>

</body>
</html>
